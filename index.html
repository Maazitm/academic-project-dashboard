<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Registry — Pro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --bg-grad-3: #312e81;
            
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            
            --neon-red: #f43f5e;
            --neon-red-glow: rgba(244, 63, 94, 0.3);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.3);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            padding: 0 20px 60px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ---------- Glassmorphism Base ---------- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* ---------- Header ---------- */
        .header {
            max-width: 1200px;
            margin: 40px auto 30px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #38bdf8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        h1 {
            font-weight: 700;
            font-size: 38px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .sync-line {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        #loading-text {
            font-size: 13px;
            color: #fcd34d !important;
            margin-top: 15px;
            font-weight: 500;
            background: rgba(252, 211, 77, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
        }

        #admin-badge {
            position: absolute;
            top: 30px;
            right: 40px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff !important;
            background: linear-gradient(45deg, #f59e0b, #ef4444) !important;
            border: none;
            border-radius: 20px !important;
            padding: 6px 16px !important;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        /* ---------- Layout ---------- */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .column {
            flex: 1;
            min-width: 340px;
            padding: 30px 25px;
            position: relative;
            overflow: hidden;
        }

        /* Glowing accents for columns */
        .column::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .column.pending::before {
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            box-shadow: 0 0 15px var(--neon-red-glow);
        }
        .column.assigned::before {
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            box-shadow: 0 0 15px var(--neon-green-glow);
        }

        .col-title {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 5px;
            text-align: center;
        }
        .red-title { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red-glow); }
        .green-title { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green-glow); }

        .stats {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ---------- Student Card ---------- */
        .student-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .student-card:hover {
            transform: translateY(-3px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-highlight);
        }

        .card-red { border-left: 4px solid var(--neon-red); }
        .card-red:hover { box-shadow: 0 10px 20px var(--neon-red-glow); }
        
        .card-green { border-left: 4px solid var(--neon-green); }
        .card-green:hover { box-shadow: 0 10px 20px var(--neon-green-glow); }

        .student-info { flex: 1; }
        
        .student-info h4 {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-info p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .roll-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .modern-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .badge-red { color: var(--neon-red); background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); }
        .badge-green { color: var(--neon-green); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }

        /* ---------- Buttons ---------- */
        button {
            font-family: 'Poppins', sans-serif;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-assign { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: #fff; 
        }
        .btn-assign:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--neon-green-glow); }
        
        .btn-remove { 
            background: linear-gradient(135deg, #f43f5e, #e11d48); 
            color: #fff; 
        }
        .btn-remove:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--neon-red-glow); }

        /* ---------- Footer ---------- */
        .footer {
            max-width: 1200px;
            margin: 50px auto 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-note {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-link {
            font-weight: 500;
            font-size: 13px;
            color: #fff;
            text-decoration: none;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .admin-link:hover { 
            background: rgba(255,255,255,0.1); 
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            .header { padding: 30px 20px; }
            #admin-badge { top: 15px; right: 15px; font-size: 10px; padding: 4px 10px !important; }
            h1 { font-size: 28px; }
            .student-card { flex-direction: column; align-items: flex-start; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header glass-panel">
        <p class="eyebrow">Office of Project Assignment</p>
        <h1>Student Project Registry</h1>
        <div class="sync-line">
            <span class="dot"></span>
            <span>Live registry • Synced dynamically via GitHub</span>
        </div>
        <div id="loading-text">Loading secure data environment...</div>
        <span id="admin-badge" style="display: none;">Admin Access Verified</span>
    </div>

    <div class="container">
        <div class="column pending glass-panel">
            <h2 class="col-title red-title">Action Required</h2>
            <div class="stats" id="red-count">Pending: 0</div>
            <div id="red-list"></div>
        </div>
        <div class="column assigned glass-panel">
            <h2 class="col-title green-title">Project Confirmed</h2>
            <div class="stats" id="green-count">Assigned: 0</div>
            <div id="green-list"></div>
        </div>
    </div>

    <div class="footer glass-panel">
        <span class="footer-note">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Encrypted GitHub REST API Connection
        </span>
        <a class="admin-link" id="admin-btn">Developer Access ⚡</a>
    </div>

    <script>
        // 🚨 CONFIGURATION 🚨
        const GITHUB_USERNAME = "Maazitm"; 
        const REPO_NAME = "academic-project-dashboard";             
        const FILE_PATH = "data.json"; 
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

        let studentData = [];
        let fileSha = ""; 
        let adminToken = ""; 
        let isAdmin = false;

        // 1. FETCH DATA DIRECTLY FROM GITHUB API
        async function fetchGitHubData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Could not fetch data.json");
                
                const data = await response.json();
                fileSha = data.sha; 
                
                const decodedContent = decodeURIComponent(escape(window.atob(data.content)));
                studentData = JSON.parse(decodedContent);
                
                document.getElementById('loading-text').style.display = "none";
                renderUI();
            } catch (error) {
                document.getElementById('loading-text').innerText = "Error fetching data. Check repository visibility or formatting.";
                console.error(error);
            }
        }

        // 2. ADMIN LOGIN
        document.getElementById('admin-btn').addEventListener('click', () => {
            if (isAdmin) { alert("You are already authenticated as Admin."); return; }
            
            const token = prompt("Enter GitHub Personal Access Token (Classic):");
            if (token) {
                adminToken = token;
                isAdmin = true;
                document.getElementById('admin-badge').style.display = "inline-block";
                renderUI(); 
            }
        });

        // 3. UPDATE THE GITHUB FILE
        window.toggleProjectStatus = async function(studentId) {
            if (!isAdmin || !adminToken) return;

            document.getElementById('loading-text').style.display = "block";
            document.getElementById('loading-text').innerText = "Pushing update to GitHub...";

            const student = studentData.find(s => s.id === studentId);
            if (student) student.hasProject = !student.hasProject;

            const updatedJson = JSON.stringify(studentData, null, 2);
            const encodedContent = window.btoa(unescape(encodeURIComponent(updatedJson)));

            try {
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${adminToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `UI Dashboard: Updated project status for student ID ${studentId}`,
                        content: encodedContent,
                        sha: fileSha 
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    fileSha = result.content.sha; 
                    document.getElementById('loading-text').style.display = "none";
                    renderUI(); 
                } else {
                    alert("Update failed! Please verify your GitHub Token permissions (needs 'repo' access).");
                    document.getElementById('loading-text').style.display = "none";
                }
            } catch (error) {
                console.error(error);
                alert("Network error occurred during deployment.");
            }
        };

        // 4. DRAW THE MODERN UI
        function renderUI() {
            const redListDiv = document.getElementById('red-list');
            const greenListDiv = document.getElementById('green-list');
            
            redListDiv.innerHTML = '';
            greenListDiv.innerHTML = '';
            let redCount = 0;
            let greenCount = 0;

            studentData.forEach(student => {
                const card = document.createElement('div');
                
                const buttonHtml = isAdmin 
                    ? (student.hasProject 
                        ? `<button class="btn-remove" onclick="window.toggleProjectStatus(${student.id})">Revoke Project</button>`
                        : `<button class="btn-assign" onclick="window.toggleProjectStatus(${student.id})">Confirm Project</button>`)
                    : ``; 

                card.className = student.hasProject ? 'student-card card-green' : 'student-card card-red';
                
                // Updated Card Inner HTML for the Glassmorphism Look
                card.innerHTML = `
                    <div class="student-info">
                        <h4>
                            ${student.id}. ${student.name}
                            <span class="modern-badge ${student.hasProject ? 'badge-green' : 'badge-red'}">
                                ${student.hasProject ? 'Assigned' : 'Pending'}
                            </span>
                        </h4>
                        <p>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            ${student.email}
                        </p>
                        <p>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            ${student.phone}
                            <span class="roll-badge">ID: ${student.roll}</span>
                        </p>
                    </div>
                    <div>${buttonHtml}</div>
                `;

                if (student.hasProject) {
                    greenCount++;
                    greenListDiv.appendChild(card);
                } else {
                    redCount++;
                    redListDiv.appendChild(card);
                }
            });

            document.getElementById('red-count').innerText = `Pending Assignments: ${redCount}`;
            document.getElementById('green-count').innerText = `Active Projects: ${greenCount}`;
        }

        window.onload = fetchGitHubData;
    </script>
</body>
</html>
