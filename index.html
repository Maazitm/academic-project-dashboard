<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Project Management</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --text-color: #333;
            --red-bg: #ffebee; --red-border: #ef9a9a; --red-text: #c62828;
            --green-bg: #e8f5e9; --green-border: #a5d6a7; --green-text: #2e7d32;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .column { flex: 1; min-width: 350px; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .col-title { text-align: center; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-top: 0; }
        .red-title { color: var(--red-text); } .green-title { color: var(--green-text); }
        .student-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card-red { background-color: var(--red-bg); border-color: var(--red-border); }
        .card-green { background-color: var(--green-bg); border-color: var(--green-border); }
        .student-info h4 { margin: 0 0 5px 0; font-size: 16px; }
        .student-info p { margin: 2px 0; font-size: 13px; color: #555; }
        button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-assign { background-color: var(--green-text); color: white; }
        .btn-remove { background-color: var(--red-text); color: white; }
        .stats { text-align: center; font-weight: bold; margin-bottom: 15px; }
        .footer { text-align: right; margin-top: 40px; padding-right: 20px; }
        .admin-link { color: #aaa; text-decoration: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Student Project Assignment Dashboard</h1>
        <p>Data synced directly from GitHub Repository</p>
        <span id="admin-badge" style="display: none; background: #333; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px;">Admin Mode Active</span>
        <div id="loading-text" style="color: blue; margin-top: 10px;">Loading data from GitHub...</div>
    </div>

    <div class="container">
        <div class="column">
            <h2 class="col-title red-title">Pending Project Selection</h2>
            <div class="stats" id="red-count">Count: 0</div>
            <div id="red-list"></div>
        </div>
        <div class="column">
            <h2 class="col-title green-title">Project Assigned</h2>
            <div class="stats" id="green-count">Count: 0</div>
            <div id="green-list"></div>
        </div>
    </div>

    <div class="footer">
        <a class="admin-link" id="admin-btn">Admin Access</a>
    </div>

    <script>
        // 🚨 CONFIGURATION 🚨
// 🚨 CONFIGURATION 🚨
const GITHUB_USERNAME = "Maazitm"; 
const REPO_NAME = "academic-project-dashboard";             
const FILE_PATH = "data.json";  // <- ONLY write "data.json" here!           // The file we created in Step 1
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

        let studentData = [];
        let fileSha = ""; // GitHub requires this code to update the file
        let adminToken = ""; 
        let isAdmin = false;

        // 1. FETCH DATA DIRECTLY FROM GITHUB API (Bypasses browser cache!)
        async function fetchGitHubData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Could not fetch data.json");
                
                const data = await response.json();
                fileSha = data.sha; // Save the SHA for updating later
                
                // GitHub sends the JSON encoded in base64. We must decode it.
                const decodedContent = decodeURIComponent(escape(window.atob(data.content)));
                studentData = JSON.parse(decodedContent);
                
                document.getElementById('loading-text').style.display = "none";
                renderUI();
            } catch (error) {
                document.getElementById('loading-text').innerText = "Error loading data. Make sure data.json exists.";
                console.error(error);
            }
        }

        // 2. ADMIN LOGIN
        document.getElementById('admin-btn').addEventListener('click', () => {
            if (isAdmin) { alert("You are already Admin."); return; }
            
            // Ask for the GitHub Token instead of a hardcoded password
            const token = prompt("Enter your GitHub Personal Access Token:");
            if (token) {
                adminToken = token;
                isAdmin = true;
                document.getElementById('admin-badge').style.display = "inline-block";
                renderUI(); 
            }
        });

        // 3. UPDATE THE GITHUB FILE (The Magic Part)
        window.toggleProjectStatus = async function(studentId) {
            if (!isAdmin || !adminToken) return;

            document.getElementById('loading-text').style.display = "block";
            document.getElementById('loading-text').innerText = "Updating GitHub Repository...";

            // Find student and flip their status
            const student = studentData.find(s => s.id === studentId);
            if (student) student.hasProject = !student.hasProject;

            // Prepare the new JSON file content
            const updatedJson = JSON.stringify(studentData, null, 2);
            // Encode back to base64 for GitHub
            const encodedContent = window.btoa(unescape(encodeURIComponent(updatedJson)));

            // Send the PUT request to GitHub
            try {
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${adminToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Admin updated status for student ID ${studentId}`,
                        content: encodedContent,
                        sha: fileSha // We must provide the original SHA to overwrite it
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    fileSha = result.content.sha; // Update the SHA for the next click
                    document.getElementById('loading-text').style.display = "none";
                    renderUI(); // Redraw screen
                } else {
                    alert("Update failed! Is your GitHub Token correct?");
                    document.getElementById('loading-text').style.display = "none";
                }
            } catch (error) {
                console.error(error);
                alert("Network error occurred.");
            }
        };

        // 4. DRAW THE SCREEN
        function renderUI() {
            const redListDiv = document.getElementById('red-list');
            const greenListDiv = document.getElementById('green-list');
            
            redListDiv.innerHTML = '';
            greenListDiv.innerHTML = '';
            let redCount = 0;
            let greenCount = 0;

            studentData.forEach(student => {
                const card = document.createElement('div');
                const buttonHtml = isAdmin 
                    ? (student.hasProject 
                        ? `<button class="btn-remove" onclick="window.toggleProjectStatus(${student.id})">Remove Project</button>`
                        : `<button class="btn-assign" onclick="window.toggleProjectStatus(${student.id})">Assign Project</button>`)
                    : ``; 

                card.className = student.hasProject ? 'student-card card-green' : 'student-card card-red';
                card.innerHTML = `
                    <div class="student-info">
                        <h4>${student.id}. ${student.name}</h4>
                        <p>${student.email} | ${student.phone}</p>
                        <p>Roll: ${student.roll}</p>
                    </div>
                    ${buttonHtml}
                `;

                if (student.hasProject) {
                    greenCount++;
                    greenListDiv.appendChild(card);
                } else {
                    redCount++;
                    redListDiv.appendChild(card);
                }
            });

            document.getElementById('red-count').innerText = `Total Students: ${redCount}`;
            document.getElementById('green-count').innerText = `Total Students: ${greenCount}`;
        }

        // Run when page loads
        window.onload = fetchGitHubData;
    </script>
</body>
</html>
