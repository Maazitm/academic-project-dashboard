<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Project Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7FB;
    --surface:#FFFFFF;
    --border:#E7E9F0;
    --ink:#111827;
    --ink-soft:#6B7280;
    --ink-faint:#9CA3AF;
    --primary:#4338CA;
    --primary-soft:#EEF0FD;
    --success:#0F9D58;
    --success-soft:#E5F6ED;
    --amber:#D97706;
    --amber-soft:#FEF3E2;
    --danger:#DC2626;
    --danger-soft:#FDEBEB;
    --shadow-sm: 0 1px 2px rgba(17,24,39,0.04);
    --shadow-md: 0 4px 14px rgba(17,24,39,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink);
    padding:0 24px 60px;
  }
  .wrap{max-width:1180px; margin:0 auto;}

  /* Top bar */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:28px 0 20px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:40px; height:40px; border-radius:11px;
    background:linear-gradient(135deg, var(--primary), #6D5CE0);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Sora',sans-serif; font-weight:700; font-size:15px;
    box-shadow: var(--shadow-md);
  }
  .brand h1{
    font-family:'Sora',sans-serif; font-weight:700; font-size:19px; margin:0; letter-spacing:-0.01em;
  }
  .brand .status-line{
    display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft); margin-top:2px;
  }
  .status-dot{width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 0 3px var(--success-soft);}
  #loading-text{font-size:12.5px; color:var(--primary); font-weight:600;}

  .top-actions{display:flex; align-items:center; gap:10px;}
  #admin-badge{
    display:none;
    font-family:'Sora',sans-serif; font-weight:600; font-size:12px;
    color:var(--primary); background:var(--primary-soft);
    border-radius:999px; padding:6px 14px;
  }
  .btn-admin{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    background:var(--ink); color:#fff; border:none; border-radius:9px;
    padding:10px 18px; cursor:pointer; transition:filter .15s ease, transform .1s ease;
  }
  .btn-admin:hover{filter:brightness(1.15);}
  .btn-admin:active{transform:scale(0.97);}

  /* Stat cards */
  .stats-row{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin:8px 0 26px;
  }
  .stat-card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:16px 18px; box-shadow:var(--shadow-sm);
  }
  .stat-label{font-size:12px; color:var(--ink-soft); font-weight:600; margin:0 0 6px; text-transform:uppercase; letter-spacing:.04em;}
  .stat-value{font-family:'Sora',sans-serif; font-size:26px; font-weight:700; margin:0;}
  .stat-value.accent-success{color:var(--success);}
  .stat-value.accent-amber{color:var(--amber);}

  /* Controls row */
  .controls-row{
    display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap;
  }
  .search-box{
    flex:1; min-width:220px; position:relative;
  }
  .search-box input{
    width:100%; padding:11px 14px 11px 38px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); font-family:'Inter',sans-serif; font-size:14px; color:var(--ink);
  }
  .search-box input:focus-visible{outline:2px solid var(--primary); outline-offset:1px;}
  .search-box svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.45;}

  .tabs{display:flex; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px;}
  .tab{
    border:none; background:transparent; font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
    color:var(--ink-soft); padding:8px 14px; border-radius:7px; cursor:pointer;
  }
  .tab.active{background:var(--primary); color:#fff;}

  /* Student list */
  .list{
    background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow-sm);
  }
  .row{
    display:flex; align-items:center; gap:16px; padding:16px 20px;
    border-bottom:1px solid var(--border);
    flex-wrap:wrap;
  }
  .row:last-child{border-bottom:none;}
  .row:hover{background:#FBFBFE;}

  .avatar{
    width:42px; height:42px; border-radius:11px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Sora',sans-serif; font-weight:700; font-size:14px; color:#fff;
  }

  .row-info{min-width:190px; flex:1.4;}
  .row-info h4{margin:0 0 3px; font-size:14.5px; font-weight:600;}
  .row-info p{margin:0; font-size:12.5px; color:var(--ink-soft);}

  .status-pill{
    font-family:'Inter',sans-serif; font-weight:600; font-size:12px; padding:5px 12px; border-radius:999px;
    white-space:nowrap;
  }
  .pill-assigned{background:var(--success-soft); color:var(--success);}
  .pill-pending{background:var(--danger-soft); color:var(--danger);}

  /* attendance display */
  .att-wrap{display:flex; align-items:center; gap:10px; min-width:190px;}
  .att-pill{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12.5px; font-weight:600; padding:5px 12px; border-radius:999px; white-space:nowrap;
  }
  .att-green{background:var(--success-soft); color:var(--success);}
  .att-amber{background:var(--amber-soft); color:var(--amber);}
  .att-red{background:var(--danger-soft); color:var(--danger);}
  .att-none{background:#F1F2F6; color:var(--ink-faint);}
  .att-bar{width:44px; height:5px; border-radius:3px; background:rgba(0,0,0,0.08); position:relative; overflow:hidden;}
  .att-bar::after{content:""; position:absolute; left:0; top:0; bottom:0; width:var(--fill,0%); border-radius:3px;}
  .att-green .att-bar::after{background:var(--success);}
  .att-amber .att-bar::after{background:var(--amber);}
  .att-red .att-bar::after{background:var(--danger);}

  .stepper{display:flex; align-items:center; gap:6px;}
  .step-btn{
    width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); font-weight:700; font-size:14px; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .step-btn:hover{background:var(--primary-soft); border-color:var(--primary); color:var(--primary);}
  .step-value{
    font-family:'Sora',sans-serif; font-weight:700; font-size:13.5px; min-width:38px; text-align:center;
  }
  .btn-save-att{
    font-family:'Inter',sans-serif; font-weight:600; font-size:12px; color:#fff; background:var(--primary);
    border:none; border-radius:8px; padding:6px 12px; cursor:pointer;
  }
  .btn-save-att:hover{filter:brightness(1.1);}

  .row-actions{display:flex; align-items:center; gap:8px; margin-left:auto;}
  .btn-toggle{
    font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px; border:none; border-radius:8px;
    padding:8px 14px; cursor:pointer; color:#fff; white-space:nowrap;
  }
  .btn-toggle.assign{background:var(--success);}
  .btn-toggle.remove{background:var(--danger);}

  .empty-state{padding:40px; text-align:center; color:var(--ink-soft); font-size:14px;}

  /* Footer */
  .footer{
    max-width:1180px; margin:32px auto 0; padding-top:18px; border-top:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
  }
  .footer-note{font-size:12.5px; color:var(--ink-soft);}
  .legend{display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--ink-soft);}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .legend i{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .lg-green{background:var(--success);} .lg-amber{background:var(--amber);} .lg-red{background:var(--danger);}

  @media (max-width:900px){
    .stats-row{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:640px){
    .stats-row{grid-template-columns:1fr 1fr;}
    .row{flex-direction:column; align-items:flex-start;}
    .row-actions{margin-left:0;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">PR</div>
      <div>
        <h1>Student Project Registry</h1>
        <div class="status-line">
          <span class="status-dot"></span>
          <span>All changes saved automatically</span>
        </div>
        <div id="loading-text">Loading records...</div>
      </div>
    </div>
    <div class="top-actions">
      <span id="admin-badge">Staff mode active</span>
      <button class="btn-admin" id="admin-btn">Staff Access</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <p class="stat-label">Total Students</p>
      <p class="stat-value" id="ledger-total">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Assigned</p>
      <p class="stat-value accent-success" id="ledger-assigned">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Pending</p>
      <p class="stat-value" id="ledger-pending">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Avg. Attendance</p>
      <p class="stat-value accent-amber" id="ledger-attendance">—</p>
    </div>
  </div>

  <div class="controls-row">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name or roll number...">
    </div>
    <div class="tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="assigned">Assigned</button>
      <button class="tab" data-filter="pending">Pending</button>
    </div>
  </div>

  <div class="list" id="student-list"></div>

  <div class="footer">
    <span class="footer-note">Records update instantly across the team</span>
    <div class="legend">
      <span><i class="lg-green"></i>Attendance ≥ 75%</span>
      <span><i class="lg-amber"></i>60–74%</span>
      <span><i class="lg-red"></i>&lt; 60%</span>
    </div>
  </div>

</div>

<script>
  // 🚨 CONFIGURATION 🚨
  const GITHUB_USERNAME = "Maazitm";
  const REPO_NAME = "academic-project-dashboard";
  const FILE_PATH = "data.json";

  // Attendance color thresholds
  const ATTENDANCE_GREEN_MIN = 75;
  const ATTENDANCE_AMBER_MIN = 60;
  const STEP = 5; // amount the +/- buttons move attendance by

  const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

  let studentData = [];
  let fileSha = "";
  let adminToken = "";
  let isAdmin = false;
  let activeFilter = "all";
  let searchTerm = "";
  const pendingEdits = {}; // studentId -> attendance value being staged before save

  const AVATAR_COLORS = ["#4338CA","#0F9D58","#D97706","#DC2626","#0EA5E9","#7C3AED","#DB2777"];
  function colorFor(id){ return AVATAR_COLORS[id % AVATAR_COLORS.length]; }
  function initials(name){
    return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();
  }

  async function fetchData(){
    try{
      const response = await fetch(API_URL);
      if(!response.ok) throw new Error("fetch failed");
      const data = await response.json();
      fileSha = data.sha;
      const decoded = decodeURIComponent(escape(window.atob(data.content)));
      studentData = JSON.parse(decoded);
      document.getElementById('loading-text').style.display = "none";
      render();
    }catch(err){
      document.getElementById('loading-text').innerText = "Couldn't load records. Please refresh.";
      console.error(err);
    }
  }

  async function commit(message){
    document.getElementById('loading-text').style.display = "block";
    document.getElementById('loading-text').innerText = "Saving changes...";
    const updatedJson = JSON.stringify(studentData, null, 2);
    const encoded = window.btoa(unescape(encodeURIComponent(updatedJson)));
    try{
      const response = await fetch(API_URL, {
        method: "PUT",
        headers: {
          "Authorization": `token ${adminToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message, content: encoded, sha: fileSha })
      });
      if(response.ok){
        const result = await response.json();
        fileSha = result.content.sha;
        document.getElementById('loading-text').style.display = "none";
        render();
      } else {
        alert("Couldn't save. Please check your access token and try again.");
        document.getElementById('loading-text').style.display = "none";
      }
    }catch(err){
      console.error(err);
      alert("Network error — please try again.");
      document.getElementById('loading-text').style.display = "none";
    }
  }

  document.getElementById('admin-btn').addEventListener('click', async () => {
    if(isAdmin){ alert("Staff mode is already on."); return; }
    const token = (prompt("Enter your GitHub Personal Access Token:") || "").trim();
    if(!token) return;

    const loadingEl = document.getElementById('loading-text');
    loadingEl.style.display = "block";
    loadingEl.innerText = "Verifying access...";

    try{
      // Check the token against this specific repo, not just that it's "a" valid token.
      const repoUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}`;
      const response = await fetch(repoUrl, {
        headers: { "Authorization": `token ${token}` }
      });

      if(response.status === 401){
        alert("That access token isn't valid. Please check it and try again.");
      } else if(response.status === 403){
        alert("That token was rejected (rate-limited or insufficient scope). Please try again.");
      } else if(response.status === 404){
        alert("That token doesn't have access to this repository.");
      } else if(!response.ok){
        alert("Couldn't verify the token right now. Please try again.");
      } else {
        const repoInfo = await response.json();
        const canWrite = !!(repoInfo.permissions && repoInfo.permissions.push);
        if(!canWrite){
          alert("This token is valid but doesn't have write access to this repository, so changes can't be saved.");
        } else {
          adminToken = token;
          isAdmin = true;
          document.getElementById('admin-badge').style.display = "inline-block";
          render();
        }
      }
    }catch(err){
      console.error(err);
      alert("Network error while verifying the token. Please try again.");
    } finally {
      loadingEl.style.display = "none";
    }
  });

  document.getElementById('search-input').addEventListener('input', (e) => {
    searchTerm = e.target.value.toLowerCase();
    render();
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      render();
    });
  });

  window.toggleProjectStatus = async function(id){
    if(!isAdmin) return;
    const s = studentData.find(x => x.id === id);
    if(!s) return;
    s.hasProject = !s.hasProject;
    await commit(`Update project status for student ${id}`);
  };

  window.adjustAttendance = function(id, delta){
    const s = studentData.find(x => x.id === id);
    if(!s) return;
    const current = pendingEdits[id] !== undefined ? pendingEdits[id]
                   : (typeof s.attendance === 'number' ? s.attendance : 0);
    pendingEdits[id] = Math.max(0, Math.min(100, current + delta));
    render();
  };

  window.saveAttendance = async function(id){
    if(!isAdmin) return;
    const s = studentData.find(x => x.id === id);
    if(!s || pendingEdits[id] === undefined) return;
    s.attendance = pendingEdits[id];
    delete pendingEdits[id];
    await commit(`Update attendance for student ${id}`);
  };

  function attendanceBand(value){
    if(value === undefined || value === null || isNaN(value)) return { cls:'att-none', label:'No data' };
    if(value >= ATTENDANCE_GREEN_MIN) return { cls:'att-green', label:`${value}%` };
    if(value >= ATTENDANCE_AMBER_MIN) return { cls:'att-amber', label:`${value}%` };
    return { cls:'att-red', label:`${value}%` };
  }

  function attendanceViewHtml(student){
    const band = attendanceBand(student.attendance);
    const fill = (student.attendance ?? 0);
    return `<div class="att-pill ${band.cls}">
               <span class="att-bar" style="--fill:${fill}%"></span>
               ${band.label}
             </div>`;
  }

  function attendanceEditHtml(student){
    const staged = pendingEdits[student.id];
    const value = staged !== undefined ? staged : (typeof student.attendance === 'number' ? student.attendance : 0);
    const hasChange = staged !== undefined;
    return `<div class="stepper">
               <button class="step-btn" onclick="window.adjustAttendance(${student.id}, -${STEP})">−</button>
               <span class="step-value">${value}%</span>
               <button class="step-btn" onclick="window.adjustAttendance(${student.id}, ${STEP})">+</button>
               ${hasChange ? `<button class="btn-save-att" onclick="window.saveAttendance(${student.id})">Save</button>` : ``}
             </div>`;
  }

  function matchesFilter(s){
    if(activeFilter === 'assigned' && !s.hasProject) return false;
    if(activeFilter === 'pending' && s.hasProject) return false;
    if(searchTerm){
      const hay = `${s.name} ${s.roll}`.toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  }

  function render(){
    const listEl = document.getElementById('student-list');
    listEl.innerHTML = '';

    let assignedCount = 0, pendingCount = 0, attSum = 0, attCount = 0;
    studentData.forEach(s => {
      if(s.hasProject) assignedCount++; else pendingCount++;
      if(typeof s.attendance === 'number' && !isNaN(s.attendance)){ attSum += s.attendance; attCount++; }
    });

    const visible = studentData.filter(matchesFilter);

    if(visible.length === 0){
      listEl.innerHTML = `<div class="empty-state">No students match this view.</div>`;
    } else {
      visible.forEach(s => {
        const row = document.createElement('div');
        row.className = 'row';
        const attendanceHtml = isAdmin ? attendanceEditHtml(s) : attendanceViewHtml(s);
        const toggleBtn = isAdmin
          ? (s.hasProject
              ? `<button class="btn-toggle remove" onclick="window.toggleProjectStatus(${s.id})">Remove</button>`
              : `<button class="btn-toggle assign" onclick="window.toggleProjectStatus(${s.id})">Assign</button>`)
          : ``;
        row.innerHTML = `
          <div class="avatar" style="background:${colorFor(s.id)}">${initials(s.name)}</div>
          <div class="row-info">
            <h4>${s.id}. ${s.name}</h4>
            <p>Roll ${s.roll} &middot; ${s.phone}</p>
          </div>
          <span class="status-pill ${s.hasProject ? 'pill-assigned' : 'pill-pending'}">
            ${s.hasProject ? 'Assigned' : 'Pending'}
          </span>
          <div class="att-wrap">${attendanceHtml}</div>
          <div class="row-actions">${toggleBtn}</div>
        `;
        listEl.appendChild(row);
      });
    }

    document.getElementById('ledger-total').innerText = studentData.length;
    document.getElementById('ledger-assigned').innerText = assignedCount;
    document.getElementById('ledger-pending').innerText = pendingCount;
    document.getElementById('ledger-attendance').innerText = attCount > 0 ? `${(attSum/attCount).toFixed(1)}%` : '—';
  }

  window.onload = fetchData;
</script>
</body>
</html>
