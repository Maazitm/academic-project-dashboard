<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Registry — Student Assignment Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:          #1B2A46;
            --ink-soft:     #435374;
            --parchment:    #F4EFE3;
            --parchment-2:  #ECE4D0;
            --card-paper:   #FFFDF7;
            --brass:        #A9793F;
            --brass-soft:   #C9A46B;
            --rule:         #CDC0A0;
            --stamp-red:    #9A3324;
            --stamp-red-bg: #F6E4DF;
            --stamp-green:  #2E6B4E;
            --stamp-green-bg:#E3EEE3;
            --shadow: 0 1px 2px rgba(27,42,70,0.06), 0 8px 20px rgba(27,42,70,0.06);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--parchment);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(169,121,63,0.08), transparent 45%),
                radial-gradient(circle at 0% 100%, rgba(27,42,70,0.05), transparent 40%);
            color: var(--ink);
            margin: 0;
            padding: 0 20px 60px;
            min-height: 100vh;
        }

        /* ---------- Letterhead ---------- */
        .letterhead {
            max-width: 1200px;
            margin: 0 auto;
            padding: 44px 10px 26px;
            display: flex;
            align-items: center;
            gap: 22px;
            border-bottom: 2px solid var(--ink);
        }
        .seal {
            flex-shrink: 0;
            width: 62px;
            height: 62px;
        }
        .letterhead-text { flex: 1; }
        .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--brass);
            font-weight: 600;
            margin: 0 0 6px;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-optical-sizing: auto;
            font-weight: 600;
            font-size: 34px;
            letter-spacing: -0.01em;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .sync-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            color: var(--ink-soft);
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--stamp-green);
            box-shadow: 0 0 0 3px var(--stamp-green-bg);
        }
        #loading-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            color: var(--brass) !important;
            margin-top: 4px;
        }

        #admin-badge {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--stamp-red) !important;
            background: var(--stamp-red-bg) !important;
            border: 1.5px solid var(--stamp-red);
            border-radius: 3px !important;
            padding: 5px 12px !important;
            transform: rotate(-3deg);
        }

        /* ---------- Layout ---------- */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 26px;
            max-width: 1200px;
            margin: 34px auto 0;
        }
        .column {
            flex: 1;
            min-width: 340px;
            background: var(--card-paper);
            border: 1px solid var(--rule);
            border-radius: 4px;
            padding: 8px 22px 26px;
            box-shadow: var(--shadow);
            position: relative;
        }
        .column::before {
            content: "";
            position: absolute;
            top: 0; left: 24px;
            width: 64px; height: 8px;
            border-radius: 0 0 4px 4px;
        }
        .column.pending::before { background: var(--stamp-red); }
        .column.assigned::before { background: var(--stamp-green); }

        .col-title {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 20px;
            padding: 22px 0 14px;
            margin: 0;
            border-bottom: 1px solid var(--rule);
        }
        .red-title { color: var(--stamp-red); }
        .green-title { color: var(--stamp-green); }

        .stats {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin: 14px 0 18px;
            font-weight: 600;
        }

        /* ---------- Student card ---------- */
        .student-card {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--rule);
            border-radius: 4px;
            padding: 16px 18px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            background: var(--card-paper);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .student-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        .card-red { background: linear-gradient(180deg, var(--stamp-red-bg), var(--card-paper) 70%); }
        .card-green { background: linear-gradient(180deg, var(--stamp-green-bg), var(--card-paper) 70%); }

        .student-info h4 {
            margin: 0 0 4px 0;
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 16.5px;
            color: var(--ink);
        }
        .student-info p {
            margin: 2px 0;
            font-size: 12.5px;
            color: var(--ink-soft);
            font-family: 'IBM Plex Mono', monospace;
        }

        /* signature element: registrar ink stamp */
        .stamp {
            position: absolute;
            top: 10px;
            right: 14px;
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 10.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 3px;
            border: 1.5px solid;
            transform: rotate(6deg);
            pointer-events: none;
            opacity: 0.9;
        }
        .card-red .stamp { color: var(--stamp-red); border-color: var(--stamp-red); }
        .card-green .stamp { color: var(--stamp-green); border-color: var(--stamp-green); }

        button {
            font-family: 'IBM Plex Sans', sans-serif;
            padding: 9px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.01em;
            white-space: nowrap;
            transition: filter 0.15s ease, transform 0.1s ease;
        }
        button:hover { filter: brightness(1.08); }
        button:active { transform: scale(0.97); }
        button:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
        .btn-assign { background-color: var(--stamp-green); color: #fff; }
        .btn-remove { background-color: var(--stamp-red); color: #fff; }

        /* ---------- Footer ---------- */
        .footer {
            max-width: 1200px;
            margin: 48px auto 0;
            padding-top: 18px;
            border-top: 1px solid var(--rule);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .footer-note {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11.5px;
            color: var(--ink-soft);
            letter-spacing: 0.02em;
        }
        .admin-link {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--brass);
            text-decoration: none;
            border: 1.5px dashed var(--brass-soft);
            border-radius: 3px;
            padding: 6px 14px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .admin-link:hover { background: var(--brass); color: #fff; border-color: var(--brass); }

        @media (max-width: 720px) {
            .letterhead { padding-top: 30px; }
            h1 { font-size: 26px; }
            .footer { flex-direction: column; align-items: flex-start; }
        }

        @media (prefers-reduced-motion: reduce) {
            .student-card, button { transition: none; }
        }
    </style>
</head>
<body>

    <div class="letterhead">
        <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="30" fill="none" stroke="#1B2A46" stroke-width="2"/>
            <circle cx="32" cy="32" r="24" fill="none" stroke="#A9793F" stroke-width="1"/>
            <text x="32" y="37" text-anchor="middle" font-family="Fraunces, serif" font-weight="700" font-size="19" fill="#1B2A46">PR</text>
        </svg>
        <div class="letterhead-text">
            <p class="eyebrow">Office of Project Assignment</p>
            <h1>Student Project Registry</h1>
            <div class="sync-line">
                <span class="dot"></span>
                <span>Live registry &middot; synced from GitHub repository</span>
            </div>
            <div id="loading-text">Loading data from GitHub...</div>
        </div>
        <span id="admin-badge" style="display: none;">Staff Mode Active</span>
    </div>

    <div class="container">
        <div class="column pending">
            <h2 class="col-title red-title">Pending Assignment</h2>
            <div class="stats" id="red-count">Count: 0</div>
            <div id="red-list"></div>
        </div>
        <div class="column assigned">
            <h2 class="col-title green-title">Project Assigned</h2>
            <div class="stats" id="green-count">Count: 0</div>
            <div id="green-list"></div>
        </div>
    </div>

    <div class="footer">
        <span class="footer-note">Records update instantly &middot; backed by GitHub version history</span>
        <a class="admin-link" id="admin-btn">Staff Access →</a>
    </div>

    <script>
        // 🚨 CONFIGURATION 🚨
// 🚨 CONFIGURATION 🚨
const GITHUB_USERNAME = "Maazitm"; 
const REPO_NAME = "academic-project-dashboard";             
const FILE_PATH = "data.json";  // <- ONLY write "data.json" here!           // The file we created in Step 1
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

        let studentData = [];
        let fileSha = ""; // GitHub requires this code to update the file
        let adminToken = ""; 
        let isAdmin = false;

        // 1. FETCH DATA DIRECTLY FROM GITHUB API (Bypasses browser cache!)
        async function fetchGitHubData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Could not fetch data.json");
                
                const data = await response.json();
                fileSha = data.sha; // Save the SHA for updating later
                
                // GitHub sends the JSON encoded in base64. We must decode it.
                const decodedContent = decodeURIComponent(escape(window.atob(data.content)));
                studentData = JSON.parse(decodedContent);
                
                document.getElementById('loading-text').style.display = "none";
                renderUI();
            } catch (error) {
                document.getElementById('loading-text').innerText = "Error loading data. Make sure data.json exists.";
                console.error(error);
            }
        }

        // 2. ADMIN LOGIN
        document.getElementById('admin-btn').addEventListener('click', () => {
            if (isAdmin) { alert("You are already Admin."); return; }
            
            // Ask for the GitHub Token instead of a hardcoded password
            const token = prompt("Enter your GitHub Personal Access Token:");
            if (token) {
                adminToken = token;
                isAdmin = true;
                document.getElementById('admin-badge').style.display = "inline-block";
                renderUI(); 
            }
        });

        // 3. UPDATE THE GITHUB FILE (The Magic Part)
        window.toggleProjectStatus = async function(studentId) {
            if (!isAdmin || !adminToken) return;

            document.getElementById('loading-text').style.display = "block";
            document.getElementById('loading-text').innerText = "Updating GitHub Repository...";

            // Find student and flip their status
            const student = studentData.find(s => s.id === studentId);
            if (student) student.hasProject = !student.hasProject;

            // Prepare the new JSON file content
            const updatedJson = JSON.stringify(studentData, null, 2);
            // Encode back to base64 for GitHub
            const encodedContent = window.btoa(unescape(encodeURIComponent(updatedJson)));

            // Send the PUT request to GitHub
            try {
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${adminToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Admin updated status for student ID ${studentId}`,
                        content: encodedContent,
                        sha: fileSha // We must provide the original SHA to overwrite it
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    fileSha = result.content.sha; // Update the SHA for the next click
                    document.getElementById('loading-text').style.display = "none";
                    renderUI(); // Redraw screen
                } else {
                    alert("Update failed! Is your GitHub Token correct?");
                    document.getElementById('loading-text').style.display = "none";
                }
            } catch (error) {
                console.error(error);
                alert("Network error occurred.");
            }
        };

        // 4. DRAW THE SCREEN
        function renderUI() {
            const redListDiv = document.getElementById('red-list');
            const greenListDiv = document.getElementById('green-list');
            
            redListDiv.innerHTML = '';
            greenListDiv.innerHTML = '';
            let redCount = 0;
            let greenCount = 0;

            studentData.forEach(student => {
                const card = document.createElement('div');
                const buttonHtml = isAdmin 
                    ? (student.hasProject 
                        ? `<button class="btn-remove" onclick="window.toggleProjectStatus(${student.id})">Remove Project</button>`
                        : `<button class="btn-assign" onclick="window.toggleProjectStatus(${student.id})">Assign Project</button>`)
                    : ``; 

                card.className = student.hasProject ? 'student-card card-green' : 'student-card card-red';
                card.innerHTML = `
                    <span class="stamp">${student.hasProject ? 'On File' : 'Pending'}</span>
                    <div class="student-info">
                        <h4>${student.id}. ${student.name}</h4>
                        <p>${student.email} | ${student.phone}</p>
                        <p>Roll: ${student.roll}</p>
                    </div>
                    ${buttonHtml}
                `;

                if (student.hasProject) {
                    greenCount++;
                    greenListDiv.appendChild(card);
                } else {
                    redCount++;
                    redListDiv.appendChild(card);
                }
            });

            document.getElementById('red-count').innerText = `Total Students: ${redCount}`;
            document.getElementById('green-count').innerText = `Total Students: ${greenCount}`;
        }

        // Run when page loads
        window.onload = fetchGitHubData;
    </script>
</body>
</html>
